name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_GAS_BASE_URL: ${{ secrets.VITE_GAS_BASE_URL }}
      VITE_GAS_USE_MOCK: false
      VITE_STATIC_DATA_META_URL: /language-learning-web/data/languages.json
      VITE_STATIC_DATA_WORDS_BASE_PATH: /language-learning-web/data
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deploy environment
        run: |
          if [ -z "$VITE_GAS_BASE_URL" ]; then
            echo "Missing GitHub Actions secret: VITE_GAS_BASE_URL"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
